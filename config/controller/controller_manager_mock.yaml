# ROS 2 Controller Manager Configuration for Agilex Piper Arm
# This file defines the controller manager settings and available controllers

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz - Main control loop frequency

    # Use the ROS 2 parameter server for configuration
    use_sim_time: false

    # Turn on clamping
    enforce_command_limits: true

    # Available controllers (not all need to be loaded at once)
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # Position-based controllers
    agilex_piper_joint_trajectory_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    # Joint position controller for direct position commands
    agilex_piper_joint_position_controller:
      type: position_controllers/JointGroupPositionController

    # Cartesian controllers for advanced manipulation
    agilex_piper_cartesian_motion_controller:
      type: cartesian_motion_controller/CartesianMotionController

    agilex_piper_motion_control_handle:
      type: cartesian_controller_handles/MotionControlHandle

    inspire_rh56_hand_joint_position_controller:
      type: position_controllers/JointGroupPositionController

    # GPIO controller for extended arm features
    agilex_piper_gpio_controller:
      type: gpio_controllers/GpioCommandController

joint_state_broadcaster:
  ros__parameters:
    use_urdf_to_filter: false
    joints:
      - joint1
      - joint2
      - joint3
      - joint4
      - joint5
      - joint6
      - thumb_proximal_yaw_joint
      - thumb_proximal_pitch_joint
      - index_proximal_joint
      - middle_proximal_joint
      - ring_proximal_joint
      - pinky_proximal_joint
    interfaces: [position, velocity]
